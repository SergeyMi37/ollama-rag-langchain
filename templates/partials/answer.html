<!-- Answer Section -->
<div class="bg-white rounded-lg shadow-lg p-6">
    <h2 class="text-2xl font-bold text-gray-800 mb-4 flex items-center gap-2">
        <svg class="w-6 h-6 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        Ответ
    </h2>
    
    <div class="prose max-w-none">
        <p class="text-gray-700 leading-relaxed whitespace-pre-wrap">{{ answer }}</p>
    </div>
</div>

<!-- Sources Section -->
{% if sources %}
<div class="bg-white rounded-lg shadow-lg p-6">
    <details class="group">
        <summary class="w-full flex items-center justify-between text-left mb-4 cursor-pointer list-none">
            <h2 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                <svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                </svg>
                Источники ({{ sources|length }})
            </h2>
            <svg class="w-5 h-5 text-gray-500 transition-transform duration-200 group-open:rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
            </svg>
        </summary>
        
        <div class="space-y-4">
            {% for source in sources %}
            <div class="border border-gray-200 rounded-lg p-4 hover:border-blue-300 transition duration-200">
                <div class="flex items-start gap-3">
                    <span class="flex-shrink-0 w-6 h-6 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-sm font-medium">
                        {{ loop.index }}
                    </span>
                    <div class="flex-1 min-w-0">
                        {% if source.metadata.source %}
                        <p class="text-sm text-gray-600 mb-2">
                            <span class="font-medium">{{ source.metadata.source }}</span>
                        </p>
                        {% endif %}
                        <p class="text-gray-700 text-sm line-clamp-3">
                            {{ source.content[:300] }}{% if source.content|length > 300 %}...{% endif %}
                        </p>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </details>
</div>
{% endif %}
