{% extends "base.html" %}

{% block title %}RAG Поиск - Ollama{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8 max-w-4xl">
    <!-- Header -->
    <header class="text-center mb-8">
        <h1 class="text-4xl font-bold text-gray-800 mb-2">
            🍁 Ollama RAG Поиск
        </h1>
        <p class="text-gray-600">
            Задайте вопрос по базе знаний на основе документов
        </p>
    </header>

    <!-- Search Form -->
    <div 
        class="bg-white rounded-lg shadow-lg p-6 mb-8"
        x-data="{ 
            question: '',
            loading: false,
            showAnswer: false
        }"
    >
        <form
            hx-post="/query"
            hx-target="#results"
            hx-swap="innerHTML"
            hx-indicator="#loading-indicator"
            @submit="showAnswer = true"
            class="space-y-4"
        >
            <div>
                <label for="question" class="block text-sm font-medium text-gray-700 mb-2">
                    Ваш вопрос
                </label>
                <textarea
                    id="question"
                    name="question"
                    x-model="question"
                    required
                    rows="3"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-200 resize-none"
                    placeholder="Введите ваш вопрос по документам..."
                ></textarea>
            </div>

            <div class="flex items-center justify-between">
                <div>
                    <label for="top_k" class="block text-sm font-medium text-gray-700 mb-1">
                        Количество источников
                    </label>
                    <select
                        id="top_k"
                        name="top_k"
                        class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                    >
                        <option value="1">1 источник</option>
                        <option value="3" selected>3 источника</option>
                        <option value="5">5 источников</option>
                        <option value="10">10 источников</option>
                    </select>
                </div>

                <button
                    type="submit"
                    class="px-6 py-3 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 transition duration-200 flex items-center gap-2"
                >
                    <span>Найти ответ</span>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </button>
            </div>
        </form>

        <!-- Loading Indicator -->
        <div id="loading-indicator" class="htmx-indicator mt-4 text-center">
            <div class="inline-flex items-center gap-2 text-blue-600">
                <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span>Поиск ответа...</span>
            </div>
        </div>
    </div>

    <!-- Results -->
    <div id="results" class="space-y-6">
        <!-- Ответ будет загружен здесь через HTMX -->
    </div>

    <!-- Footer -->
    <footer class="text-center mt-12 text-gray-500 text-sm">
        <p>Ollama RAG Service &copy; 2024</p>
        <p class="mt-1">
            <a href="/docs" target="_blank" class="text-blue-600 hover:underline">
                API Документация
            </a>
        </p>
    </footer>
</div>
{% endblock %}
